      margin-bottom: 18px;
      font-size: 0.88em;

      display: flex;

    .category-title {

      color: var(--primary-purple);
      text-transform: uppercase;
      margin: 16px 0 10px;
      font-weight: 700;
      letter-spacing: 1px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .category-title::after {
      content: "";
      flex: 1;
      height: 1px;
      background: linear-gradient(90deg, var(--primary-purple), transparent);
    }

    .file-card {
      background: var(--glass-bg);
      border-radius: 12px;
      padding: 6px;
      margin-bottom: 12px;
      border: 1px solid rgba(255,255,255,0.06);
    }

    /* ✅ แถวกดได้ทั้งแถว */
    .file-link-row{
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      padding: 11px 12px;
      margin: 4px 0;
      font-size: 0.9em;
      border-radius: 10px;
      transition: 0.25s;
      text-decoration: none;
      color: var(--text-primary);
    }

    .file-link-row:hover {
      background: rgba(255, 255, 255, 0.05);
      transform: translateX(4px);
    }

    .value {
      color: #00ff00;
      font-weight: 800;
      text-shadow: 0 0 8px rgba(0, 255, 0, 0.35);
      font-family: 'Orbitron', sans-serif;
      white-space: nowrap;
    }

    /* ✅ ปุ่ม download เล็ก ๆ */

      color: #000;
      font-weight: 900;
      white-space: nowrap;
      box-shadow: 0 4px 12px rgba(0,255,255,.18);

    .cyber-button {
      display: block;

      padding: 16px;
      background: linear-gradient(45deg, #00ffff, #8b5cf6);
      color: #000;
      text-decoration: none;
      font-weight: 900;
      border-radius: 10px;
      text-transform: uppercase;
      transition: 0.3s;
      box-shadow: 0 5px 15px rgba(0, 255, 255, 0.3);
    }

    .cyber-button:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 25px rgba(0, 255, 255, 0.5);
      filter: brightness(1.2);
    }

    footer {

      font-size: 0.85em;
      color: rgba(255,255,255,0.65);

    @media (max-width: 420px) {
      .container { padding: 20px; }
      .file-link-row { flex-direction: column; align-items: flex-start; }
      .value, .download-pill { align-self: flex-end; }
    }

    .blink {
      animation: blink 0.8s infinite;
      color: yellow;
      background: black;
      padding: 2px 6px;
      border-radius: 6px;
      font-weight: bold;
      font-family: 'Orbitron', sans-serif;
    }
    @keyframes blink {
      0%, 50% { opacity: 1; }
      51%, 100% { opacity: 0; }
    }
  </style>
</head>
