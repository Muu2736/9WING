<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">

<link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;600;700&family=Orbitron:wght@600;800&display=swap" rel="stylesheet">

<style>
:root{
  --yellow:#ffd500;
  --yellow-2:#ffb700;
  --yellow-3:#ffea00;
  --bg:#050505;
  --panel:#0b0b0b;
  --panel-2:#121212;
  --text:#fffbea;
  --muted:#b8a94a;
  --line:rgba(255,213,0,.35);
}

*{
  box-sizing:border-box;
  margin:0;
  padding:0;
}

body{
  font-family:'Prompt',sans-serif;
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  padding:20px;
  color:var(--text);
  background:
    radial-gradient(circle at top, rgba(255,213,0,.15), transparent 30%),
    radial-gradient(circle at bottom, rgba(255,183,0,.12), transparent 35%),
    linear-gradient(135deg, #000000 0%, #0a0a0a 45%, #000000 100%);
}

.container{
  width:95%;
  max-width:520px;
  position:relative;
  overflow:hidden;
  background:linear-gradient(180deg, rgba(10,10,10,.95), rgba(5,5,5,.96));
  border-radius:20px;
  padding:28px 24px 24px;
  border:1px solid rgba(255,213,0,.35);
  backdrop-filter:blur(12px);
  text-align:center;
  box-shadow:
    0 0 12px rgba(255,213,0,.22),
    0 0 30px rgba(255,213,0,.14),
    inset 0 0 18px rgba(255,255,255,.02);
}

h1{
  font-family:'Orbitron',sans-serif;
  font-size:1.9em;
  letter-spacing:2px;
  margin-bottom:10px;
  background:linear-gradient(90deg, var(--yellow), var(--yellow-2), var(--yellow-3));
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

.status{
  font-size:.82em;
  display:inline-block;
  padding:7px 12px;
  border-radius:999px;
  color:#ffe066;
  background:rgba(255,213,0,.08);
  border:1px solid rgba(255,213,0,.28);
  margin-bottom:20px;
}

.warning{
  background:rgba(255,213,0,.08);
  border:1px solid rgba(255,213,0,.25);
  padding:12px;
  border-radius:12px;
  font-size:.92em;
  margin-bottom:18px;
  color:#fff3b0;
}

.section{
  margin-top:10px;
  margin-bottom:14px;
  font-size:.85em;
  color:var(--yellow);
  text-transform:uppercase;
  font-weight:700;
  letter-spacing:2px;
}

.device-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
  margin-top:10px;
}

.device-card{
  background:linear-gradient(180deg, rgba(255,255,255,.04), rgba(255,255,255,.02));
  border-radius:14px;
  border:1px solid rgba(255,213,0,.15);
  padding:18px;
  text-align:center;
  transition:.3s;
}

.device-card:hover{
  transform:translateY(-4px) scale(1.01);
  border-color:rgba(255,213,0,.45);
  box-shadow:
    0 0 10px rgba(255,213,0,.45),
    0 0 24px rgba(255,213,0,.22);
}

.device-card a{
  text-decoration:none;
  color:white;
  font-weight:700;
  font-size:.95em;
  display:block;
}

.blink{
  display:inline-block;
  background:rgba(0,0,0,.55);
  color:var(--yellow);
  padding:8px 12px;
  border-radius:8px;
  font-family:'Orbitron',sans-serif;
  border:1px solid rgba(255,213,0,.25);
  animation:blink 1s infinite;
}

@keyframes blink{
  0%{opacity:1}
  50%{opacity:.55}
  100%{opacity:1}
}

.main-btn{
  margin-top:22px;
  display:block;
  padding:15px;
  border-radius:12px;
  background:linear-gradient(90deg, var(--yellow), var(--yellow-2), #ff9900);
  color:#000;
  font-weight:900;
  text-decoration:none;
  transition:.3s;
  box-shadow:
    0 0 12px rgba(255,213,0,.30),
    0 0 28px rgba(255,213,0,.18);
}

.main-btn:hover{
  transform:translateY(-3px);
  box-shadow:
    0 0 16px rgba(255,213,0,.50),
    0 0 32px rgba(255,213,0,.28);
}

.device{
  margin-top:15px;
  font-size:.8em;
  color:var(--muted);
}

footer{
  margin-top:15px;
  font-size:.75em;
  color:#c2b04d;
}

.modal-bg{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.75);
  display:none;
  justify-content:center;
  align-items:center;
}

.modal{
  background:#0b0b0b;
  padding:25px;
  border-radius:14px;
  border:1px solid rgba(255,213,0,.35);
  text-align:center;
  color:white;
}

.modal button{
  margin-top:15px;
  padding:9px 16px;
  border:none;
  border-radius:8px;
  background:linear-gradient(90deg, var(--yellow), var(--yellow-2));
  color:#000;
  font-weight:700;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="container">

  <h1>VERSION DEVICE</h1>

  <div class="status">
    UPDATE 15/03/2026
  </div>

  <div class="warning">
    ⚠️ เลือกอุปกรณ์ที่จะใช้งานโปรแต่ละอุปกรณ์จะมีฟังชั่นไม่เหมือนกัน
  </div>

  <div class="section">VERSION PRO</div>

  <div class="device-grid">

    <div class="device-card">
      <a href="https://www.9wing.shop/menu.html" target="_blank">
        💻 PC NOTBOOK
      </a>
    </div>

    <div class="device-card">
      <a href="https://www.9wing.shop/Cloud" target="_blank">
        📱 CLOUD PHONE
      </a>
    </div>

  </div>

  <a href="https://www.m.me/say.wing.656700" target="_blank" class="main-btn">
    ติดต่อฝ่ายบริการลูกค้า
  </a>

  <div class="device" id="device"></div>

  <footer>
    © 2026 9WING.SHOP
  </footer>

</div>

<div class="modal-bg" id="modal">
  <div class="modal">
    <p>ยินดีต้อนรับ ลูกค้าใหม่ทุกท่าน</p>
    <button onclick="closeModal()">ปิด</button>
  </div>
</div>

<script>
function detectDevice(){
  let device="Desktop";
  const isMobile=/Android|iPhone|iPad/i.test(navigator.userAgent);
  if(isMobile){ device="Mobile Device"; }
  document.getElementById("device").innerText="DEVICE : "+device;
}

function showModal(){
  document.getElementById("modal").style.display="flex";
}

function closeModal(){
  document.getElementById("modal").style.display="none";
}

document.addEventListener("DOMContentLoaded",function(){
  detectDevice();
  setTimeout(showModal,4000);
});
</script>

</body>
</html>
