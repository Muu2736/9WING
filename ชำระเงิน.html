<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>9WING Payment บริการชำระเงินผ่านพร้อมเพย์</title>
  <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@400;600;800&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
  <style>
    :root{--primary:#ffe600;--secondary:#ff9d00;--bg:#020617;--glass:rgba(255,255,255,.04);--glass-border:rgba(255,230,0,.16)}
    *{box-sizing:border-box;transition:all .3s cubic-bezier(.4,0,.2,1)}
    body{font-family:'Prompt',sans-serif;background:var(--bg);background-image:radial-gradient(circle at 10% 20%,rgba(255,230,0,.10) 0%,transparent 40%),radial-gradient(circle at 90% 80%,rgba(255,157,0,.10) 0%,transparent 40%);min-height:100vh;margin:0;display:flex;justify-content:center;align-items:center;color:#fff;padding:20px}
    .card{width:90%;max-width:420px;background:var(--glass);backdrop-filter:blur(20px);padding:44px 28px;border-radius:40px;border:1px solid var(--glass-border);text-align:center;box-shadow:0 25px 50px -12px rgba(0,0,0,.5)}
    .logo{width:160px;height:160px;object-fit:cover;border-radius:34px;margin-bottom:25px;border:2px solid var(--primary);box-shadow:0 0 26px rgba(255,230,0,.30);animation:float 4s ease-in-out infinite}
    @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}
    h1{font-family:'Orbitron',sans-serif;font-size:1.8rem;margin:0;background:linear-gradient(to right,#fff,var(--primary));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
    .subtitle{color:#94a3b8;font-size:.9rem;margin:10px 0 35px}
    .btn-main{width:100%;padding:18px;background:linear-gradient(135deg,var(--primary),var(--secondary));color:#05070a;border:none;border-radius:20px;font-size:1.1rem;font-weight:800;cursor:pointer;box-shadow:0 10px 20px rgba(255,230,0,.18)}
    .btn-main:hover{transform:scale(1.03);box-shadow:0 15px 30px rgba(255,230,0,.30)}
    .modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);backdrop-filter:blur(15px);z-index:100;align-items:center;justify-content:center;padding:20px}
    .modal-content{background:#0f172a;width:100%;max-width:380px;padding:30px;border-radius:35px;border:1px solid var(--primary);position:relative}
    .qr-container{background:#fff;padding:15px;border-radius:25px;margin-bottom:20px}.qr-container img{width:100%;display:block;border-radius:15px}
    .bank-box{text-align:left;padding:18px;background:rgba(255,255,255,.05);border-radius:20px;margin-bottom:20px;position:relative}
    .bank-label{color:var(--primary);font-size:.8rem;display:block;margin-bottom:5px}.bank-num{font-family:'Orbitron',sans-serif;font-size:1.25rem;color:#fff}.bank-name{font-size:.85rem;color:#94a3b8;display:block;margin-top:5px}
    .copy-btn{position:absolute;right:15px;top:50%;transform:translateY(-50%);background:var(--primary);color:#000;border:none;padding:8px 12px;border-radius:12px;font-weight:800;font-size:.7rem;cursor:pointer}
    .close-link{display:block;margin-top:20px;color:#94a3b8;text-decoration:none;font-size:.9rem;text-align:center}
    #toast{position:fixed;bottom:40px;background:var(--primary);color:#000;padding:12px 25px;border-radius:15px;font-weight:800;opacity:0;pointer-events:none;z-index:1000}
    .back-link{display:block;margin-top:18px;color:#64748b;text-decoration:none;font-size:.85rem}
  </style>
</head>
<body>
  <div id="toast">คัดลอกเลขบัญชีแล้ว!</div>
  <div class="card">
    <img src="https://img1.pic.in.th/images/ChatGPT-Image-2-..-2569-08_36_15.th.png" class="logo" alt="9WING">
    <h1>9WING PAYMENT</h1>
    <p class="subtitle">Service Payment System</p>
    <button class="btn-main" onclick="openModal()">ชำระค่าบริการ</button>
    
    <a href="https://www.m.me/say.wing.656700" style="display:block;margin-top:16px;color:#64748b;text-decoration:none;font-size:.85rem;">ติดต่อฝ่ายบริการลูกค้า</a>
  </div>
  <div id="paymentModal" class="modal">
    <div class="modal-content">
      <h2 style="margin:0 0 20px;font-size:1.2rem;text-align:center;">SCAN TO PAYMENT</h2>
      <div class="qr-container"><img src="https://img2.pic.in.th/IMG_20260210_125203.md.jpg" alt="PromptPay"></div>
      <div class="bank-box">
        <span class="bank-label">ธนาคารกรุงศรีอยุธยา</span>
        <span class="bank-num">219-1-41568-4</span>
        <span class="bank-name">ชื่อบัญชี: นาย สุนันทวัฒ ลอสุขพูล</span>
        <button class="copy-btn" onclick="copyText()">COPY</button>
      </div>
      <button class="btn-main" style="padding:15px;font-size:1rem;" onclick="window.location.href='https://www.m.me/say.wing.656700'">แจ้งโอนเงินทันที</button>
      <a href="#" onclick="closeModal()" class="close-link">ย้อนกลับ</a>
    </div>
  </div>
  <script>
    const modal=document.getElementById('paymentModal');const toast=document.getElementById('toast');
    function openModal(){modal.style.display='flex'}function closeModal(){modal.style.display='none'}
    function copyText(){navigator.clipboard.writeText('2191415684');toast.style.opacity='1';setTimeout(()=>toast.style.opacity='0',2000)}
    window.onclick=(e)=>{if(e.target==modal)closeModal()}
  </script>
</body>
</html>
